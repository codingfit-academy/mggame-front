# ─────────────────────────────────────────────────────────────
# .github/workflows/build.yml  —  Front (React/Vite) CI
#
# Trigger:
#   - pull_request → main : lint + docker build (push 없음)
#   - push → main         : lint + build + GHCR push
#
# Repository Variables (Settings → Secrets and variables → Variables):
#   STUDENT_NAME = alice    ← 반드시 설정!
#
# Org-level Secrets (자동 상속):
#   SERVER_SSH_HOST, SERVER_SSH_USER, SERVER_SSH_KEY, GHCR_DEPLOY_TOKEN
# ─────────────────────────────────────────────────────────────
name: Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  ORG: codingfit-academy

jobs:
  # ── Lint ───────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then yarn --frozen-lockfile
          elif [ -f package-lock.json ]; then npm ci
          elif [ -f pnpm-lock.yaml ]; then corepack enable pnpm && pnpm i --frozen-lockfile
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present -- --passWithNoTests

  # ── Docker Build & Push ────────────────────────────────────
  docker-build:
    name: Docker Build${{ github.event_name == 'push' && ' & Push' || '' }}
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ vars.STUDENT_NAME }}-front
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=stable,enable=${{ github.event_name == 'push' }}
          labels: |
            org.opencontainers.image.title=${{ vars.STUDENT_NAME }}-front
            org.opencontainers.image.description=Academy Front (React) for ${{ vars.STUDENT_NAME }}
            academy.student=${{ vars.STUDENT_NAME }}
            academy.service=front

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Summary
        if: github.event_name == 'push'
        run: |
          {
            echo "## ✅ Build & Push 완료"
            echo "| 항목 | 값 |"
            echo "|---|---|"
            echo "| Student | \`${{ vars.STUDENT_NAME }}\` |"
            echo "| Image | \`${{ env.REGISTRY }}/${{ env.ORG }}/${{ vars.STUDENT_NAME }}-front\` |"
            echo "| SHA Tag | \`${{ steps.sha.outputs.tag }}\` |"
            echo ""
            echo "➡ 선생님이 어드민 콘솔에서 Deploy 버튼을 누르면 서버에 배포됩니다."
          } >> $GITHUB_STEP_SUMMARY
