# ─────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml  —  Front (Next.js) CD
#
# Trigger:
#   - workflow_run: "Build & Push" 완료 후 자동 실행
#   - workflow_dispatch: 선생님이 특정 태그로 수동 배포
#
# 승인 설정 (필수):
#   GitHub → Repo → Settings → Environments → New environment: "production"
#   → Required reviewers: [teacher-github-username]
#   → Wait timer: 0 (즉시 알림)
#
# 흐름:
#   빌드 완료 → deploy.yml 트리거 → 선생님 승인 대기
#   → GHCR: candidate → stable, stable → previous
#   → SSH: deploy_from_image.sh 실행
#   → Health check (외부 URL)
#   → 실패 시: rollback_student.sh + GHCR 태그 복원
# ─────────────────────────────────────────────────────────────
name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 이미지 태그 (예: sha-a1b2c3d 또는 candidate)"
        required: false
        default: "candidate"
        type: string
      reason:
        description: "배포 사유 (선택)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: codingfit-academy
  DOMAIN: codingfit.kr

jobs:
  # ── 빌드 결과 확인 ─────────────────────────────────────────
  gate:
    name: Check Build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check
        id: check
        run: echo "proceed=true" >> $GITHUB_OUTPUT

  # ── 승인 후 배포 ───────────────────────────────────────────
  deploy:
    name: Deploy (선생님 승인 필요)
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    environment: production       # ← 이 줄이 승인 게이트

    steps:
      # ── 배포할 이미지 태그 결정 ──────────────────────────
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="candidate"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using tag: ${TAG}"

      # ── GHCR 로그인 ──────────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 태그 승격: candidate → stable (이전 stable → previous) ──
      - name: Promote image tags
        id: promote
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.ORG }}/${{ vars.STUDENT_NAME }}-front"
          TAG="${{ steps.tag.outputs.tag }}"

          echo "### 태그 승격 작업" >> $GITHUB_STEP_SUMMARY

          # 현재 stable → previous (첫 배포 시 stable 없을 수 있음)
          if docker buildx imagetools inspect "${IMAGE}:stable" >/dev/null 2>&1; then
            docker buildx imagetools create \
              --tag "${IMAGE}:previous" \
              "${IMAGE}:stable"
            echo "- \`stable\` → \`previous\` ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "- \`stable\` 없음, \`previous\` 생성 건너뜀" >> $GITHUB_STEP_SUMMARY
          fi

          # 지정 태그 → stable
          docker buildx imagetools create \
            --tag "${IMAGE}:stable" \
            "${IMAGE}:${TAG}"
          echo "- \`${TAG}\` → \`stable\` ✅" >> $GITHUB_STEP_SUMMARY

      # ── SSH: 서버에서 배포 실행 ──────────────────────────
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ vars.SERVER_SSH_PORT || 22 }}
          timeout: 180s
          command_timeout: 150s
          script: |
            export GHCR_TOKEN="${{ secrets.GHCR_DEPLOY_TOKEN }}"
            export IS_EDGE_NODE=true
            /srv/academy/scripts/deploy_from_image.sh \
              "${{ vars.STUDENT_NAME }}" \
              "front" \
              "stable"

      # ── 외부 Health Check (GitHub Actions Runner → 공개 URL) ──
      - name: External health check
        id: health
        continue-on-error: true
        run: |
          URL="https://${{ vars.STUDENT_NAME }}.${{ env.DOMAIN }}"
          MAX=12; WAIT=10; ATTEMPT=0

          echo "Health check: $URL" | tee -a $GITHUB_STEP_SUMMARY

          while [ $ATTEMPT -lt $MAX ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --connect-timeout 10 "$URL" 2>/dev/null || echo "000")

            if [ "$HTTP" = "200" ]; then
              echo "✅ HTTP $HTTP (시도 $ATTEMPT/${MAX})" | tee -a $GITHUB_STEP_SUMMARY
              exit 0
            fi

            echo "시도 $ATTEMPT/${MAX}: HTTP $HTTP — ${WAIT}초 후 재시도..."
            sleep $WAIT
          done

          echo "❌ Health check 실패 (${MAX}회 × ${WAIT}초 = $((MAX * WAIT))초 초과)" \
            | tee -a $GITHUB_STEP_SUMMARY
          exit 1

      # ── 자동 롤백 (health check 실패 시) ─────────────────
      - name: Auto rollback — server
        if: steps.health.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 120s
          script: |
            export GITHUB_STEP_SUMMARY=/tmp/rollback_summary_${{ vars.STUDENT_NAME }}.txt
            export IS_EDGE_NODE=true
            /srv/academy/scripts/rollback_student.sh \
              "${{ vars.STUDENT_NAME }}" \
              "front"
            echo "--- 롤백 로그 ---"
            cat "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Auto rollback — restore GHCR stable tag
        if: steps.health.outcome == 'failure'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.ORG }}/${{ vars.STUDENT_NAME }}-front"
          if docker buildx imagetools inspect "${IMAGE}:previous" >/dev/null 2>&1; then
            docker buildx imagetools create \
              --tag "${IMAGE}:stable" \
              "${IMAGE}:previous"
            echo "⚠️ GHCR stable → previous로 복원됨" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail pipeline after rollback
        if: steps.health.outcome == 'failure'
        run: |
          echo "❌ 배포 실패 → 자동 롤백 완료. 다음 커밋에서 재시도하세요." >> $GITHUB_STEP_SUMMARY
          exit 1

      # ── 성공 요약 ─────────────────────────────────────────
      - name: Success summary
        if: steps.health.outcome == 'success'
        run: |
          {
            echo "## ✅ 배포 성공"
            echo "| 항목 | 값 |"
            echo "|---|---|"
            echo "| Student | \`${{ vars.STUDENT_NAME }}\` |"
            echo "| Service | front |"
            echo "| Tag | \`${{ steps.tag.outputs.tag }}\` → \`stable\` |"
            echo "| URL | https://${{ vars.STUDENT_NAME }}.${{ env.DOMAIN }} |"
            echo "| 배포 시각 | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo "| 배포자 | @${{ github.actor }} |"
            echo "| 사유 | ${{ github.event.inputs.reason || 'main merge' }} |"
          } >> $GITHUB_STEP_SUMMARY
